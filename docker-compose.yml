x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/ssl/certs  # Монтируем локальную папку с сертификатами
      - './nginx.conf:/etc/nginx/nginx.conf'
      - /etc/letsencrypt/:/etc/letsencrypt/
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - dev
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 32m
    stop_grace_period: 30s
    logging: *default-logging

  backend:
    build:
      context: ./backend
    init: true
    networks:
      - dev
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./downloads:/root/Downloads
      - ./cookies.txt:/cookies.txt
    mem_limit: 1400m
    mem_reservation: 256m
    restart: unless-stopped
    pids_limit: 256
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/queue_status/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    init: true
    networks:
      - dev
    volumes:
      - /etc/letsencrypt/live/videovault.ru:/certs:ro  # Монтируем сертификаты с хоста в контейнер
      - ./certs:/etc/ssl/certs  # Монтируем локальную папку с сертификатами
      - /etc/letsencrypt/live/videovault.ru/:/etc/letsencrypt/live/videovault.ru/
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 32m
    stop_grace_period: 30s
    logging: *default-logging
